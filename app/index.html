<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexForce — Shop App</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231d4d3d'/%3E%3Ctext x='50' y='68' font-family='system-ui' font-size='52' font-weight='700' fill='%23bef264' text-anchor='middle'%3EF%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1d4d3d; --green-dark: #0f2922; --lime: #bef264;
    --cream: #f6f3ee; --card: #fbf9f4; --border: #e0d9c8;
    --text: #0f2922; --text-mute: #5a6e64; --danger: #b91c1c; --success: #15803d;
  }
  * { margin:0; padding:0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.55; }
  a { color: var(--green); }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 15px; }

  /* nav */
  nav { background: var(--green); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; color: #fff; }
  .brand svg { width: 28px; height: 28px; }
  .brand-word { font-weight: 500; font-size: 17px; letter-spacing: -0.01em; }
  .brand-word .dot { color: var(--lime); }
  .nav-right { display: flex; gap: 14px; align-items: center; }
  .nav-link { color: rgba(255,255,255,.85); text-decoration: none; font-size: 14px; }
  .nav-link:hover { color: var(--lime); }
  .nav-cta { background: var(--lime); color: var(--green-dark); padding: 7px 14px; border-radius: 6px; text-decoration: none; font-weight: 500; font-size: 13px; border: 0; }

  .container { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }
  .narrow { max-width: 560px; margin: 0 auto; }

  h1 { font-weight: 500; font-size: 26px; letter-spacing: -0.02em; margin-bottom: 8px; }
  h2 { font-weight: 500; font-size: 18px; letter-spacing: -0.01em; margin-bottom: 8px; }
  .sub { color: var(--text-mute); margin-bottom: 24px; line-height: 1.55; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .card-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }

  label { display: block; font-size: 13px; font-weight: 500; color: var(--text-mute); margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px;
    background: #fff; color: var(--text); outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--green); }
  textarea { resize: vertical; min-height: 80px; }
  .field { margin-bottom: 16px; }
  .field .hint { font-size: 12px; color: var(--text-mute); margin-top: 4px; }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }

  .btn { background: var(--green); color: #fff; border: 0; padding: 12px 22px; border-radius: 8px; font-weight: 500; font-size: 14px; }
  .btn:hover { background: var(--green-dark); }
  .btn.secondary { background: var(--cream); color: var(--text); border: 1px solid var(--border); }
  .btn.secondary:hover { background: #ece8de; }
  .btn.lime { background: var(--lime); color: var(--green-dark); }
  .btn.danger { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .alert { padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
  .alert.error { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }
  .alert.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }
  .alert.info { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }

  .stepper { display: flex; gap: 6px; margin-bottom: 24px; }
  .step-pill { flex: 1; height: 4px; background: var(--border); border-radius: 2px; transition: background .2s; }
  .step-pill.done { background: var(--green); }
  .step-pill.active { background: var(--lime); }

  .brand-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .brand-tile { aspect-ratio: 1.4; border-radius: 8px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: flex-end; padding: 6px 8px; font-size: 11px; color: #fff; font-weight: 500; }
  .brand-tile.selected { border-color: var(--green-dark); box-shadow: 0 0 0 2px var(--lime); }

  /* dashboard */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .stat-num { font-size: 26px; font-weight: 500; color: var(--green); font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; }

  .applicant-row { padding: 14px 18px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr auto; gap: 12px; align-items: center; cursor: pointer; }
  .applicant-row:hover { background: rgba(190,242,100,0.08); }
  .applicant-row:last-child { border-bottom: 0; }
  .applicant-name { font-weight: 500; }
  .applicant-meta { font-size: 12px; color: var(--text-mute); }
  .status-pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .status-new { background: #fff7ed; color: #c2410c; }
  .status-screening { background: #eff6ff; color: #1d4ed8; }
  .status-screened { background: #ecfccb; color: #4d7c0f; }
  .status-booked { background: #f0fdf4; color: var(--success); }
  .status-hired { background: var(--green); color: var(--lime); }
  .status-rejected { background: #fef2f2; color: var(--danger); }
  .status-ghosted { background: #f1f5f9; color: var(--text-mute); }

  .url-row { display: flex; align-items: center; gap: 10px; background: var(--cream); padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .url-row a { color: var(--green); text-decoration: none; flex: 1; }
  .url-row button { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; }

  .preview-box { border: 2px dashed var(--border); border-radius: 12px; padding: 20px; background: #fff; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .tab { padding: 9px 14px; background: transparent; border: 0; font-size: 14px; color: var(--text-mute); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--text); border-bottom-color: var(--green); font-weight: 500; }

  .empty { text-align: center; padding: 50px 20px; color: var(--text-mute); }

  .modal-bg { position: fixed; inset: 0; background: rgba(15,41,34,0.55); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 24px; }

  @media (max-width: 700px) {
    .applicant-row { grid-template-columns: 1fr; }
    .row { flex-direction: column; }
    .brand-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <a href="/app/" class="brand">
    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="56" height="56" rx="14" fill="#1d4d3d"/>
      <path d="M 18 18 L 30 18 L 30 22.5 L 23 22.5 L 23 27.5 L 28.5 27.5 L 28.5 32 L 23 32 L 23 44 L 18 44 Z" fill="#f6f3ee"/>
      <path d="M 32 18 L 44 18 L 44 22.5 L 37 22.5 L 37 27.5 L 42.5 27.5 L 42.5 32 L 37 32 L 37 44 L 32 44 Z" fill="#bef264"/>
      <circle cx="44" cy="44" r="3" fill="#bef264"/>
    </svg>
    <span class="brand-word">flexforce<span class="dot">.</span></span>
  </a>
  <div class="nav-right" id="navRight"></div>
</nav>

<div id="app" class="container"></div>

<script>
const $ = (id) => document.getElementById(id);
const $$ = (sel) => document.querySelectorAll(sel);
const root = $('app');

const BRAND_PRESETS = [
  { name: 'Forest', primary: '#1d4d3d', dark: '#0f2922', soft: '#f6f3ee' },
  { name: 'Burnt Orange', primary: '#c2410c', dark: '#9a330a', soft: '#fff7ed' },
  { name: 'Steel Blue', primary: '#1d4ed8', dark: '#1e3a8a', soft: '#eff6ff' },
  { name: 'Crimson', primary: '#b91c1c', dark: '#7f1d1d', soft: '#fef2f2' },
  { name: 'Slate', primary: '#334155', dark: '#1e293b', soft: '#f1f5f9' },
  { name: 'Plum', primary: '#7e22ce', dark: '#581c87', soft: '#faf5ff' },
  { name: 'Amber', primary: '#b45309', dark: '#78350f', soft: '#fffbeb' },
  { name: 'Teal', primary: '#0f766e', dark: '#134e4a', soft: '#f0fdfa' }
];
const TRADE_OPTIONS = [
  { value: 'hvac', label: 'HVAC' },
  { value: 'plumbing', label: 'Plumbing' },
  { value: 'electrical', label: 'Electrical' },
  { value: 'roofing', label: 'Roofing' },
  { value: 'other', label: 'Other' }
];
const STATE_OPTIONS = [
  { value: 'texas', label: 'Texas' },
  { value: 'new-jersey', label: 'New Jersey' },
  { value: 'utah', label: 'Utah' },
  { value: 'connecticut', label: 'Connecticut' },
  { value: 'new-york', label: 'New York' },
  { value: 'california', label: 'California' },
  { value: 'florida', label: 'Florida' },
  { value: '', label: 'Other / nationwide' }
];

let session = null;
let myShops = [];
let activeShopSlug = null;

async function api(path, opts = {}) {
  const r = await fetch(path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    credentials: 'include',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await r.json().catch(() => ({}));
  return { ok: r.ok, status: r.status, data };
}

function navRight() {
  if (!session) {
    return `<a class="nav-link" href="/">Home</a><a class="nav-cta" href="/app/?view=login">Sign in</a>`;
  }
  return `<a class="nav-link" href="/app/?view=dashboard">Dashboard</a><a class="nav-link" href="/app/?view=applicants">Applicants</a><a class="nav-link" href="/app/?view=settings">Settings</a><button class="nav-link" style="background:transparent;border:0;color:rgba(255,255,255,.85)" onclick="signOut()">Sign out</button>`;
}

async function signOut() {
  await api('/api/auth/logout', { method: 'POST' });
  location.href = '/app/?view=login';
}

function setView(view) {
  const url = new URL(location.href);
  url.searchParams.set('view', view);
  history.pushState({}, '', url);
  render();
}

function escapeHTML(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function alert(kind, msg) {
  return `<div class="alert ${kind}">${escapeHTML(msg)}</div>`;
}

// ---------- LOGIN ----------
function renderLogin() {
  const params = new URLSearchParams(location.search);
  const errMsg = params.get('error') === 'expired' ? 'That sign-in link expired. Send a fresh one.' : '';
  root.innerHTML = `
    <div class="narrow">
      <h1>Sign in</h1>
      <p class="sub">We'll email you a one-tap sign-in link. No password required.</p>
      ${errMsg ? alert('error', errMsg) : ''}
      <div class="card">
        <form id="loginForm">
          <div class="field">
            <label>Email</label>
            <input type="email" id="loginEmail" required placeholder="you@yourshop.com" autofocus>
          </div>
          <button class="btn" type="submit" id="loginSubmit">Send sign-in link</button>
        </form>
        <div id="loginResult" style="margin-top:14px"></div>
      </div>
      <p class="sub" style="text-align:center;margin-top:16px">New to FlexForce? <a href="/app/?view=onboard-pre">Create your apply page →</a></p>
    </div>`;
  $('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = $('loginEmail').value.trim();
    const btn = $('loginSubmit');
    btn.disabled = true; btn.textContent = 'Sending…';
    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect') || '/app/?view=dashboard';
    const r = await api('/api/auth/magic-link', { method: 'POST', body: { email, redirect } });
    btn.disabled = false; btn.textContent = 'Send sign-in link';
    if (r.ok) {
      $('loginResult').innerHTML = alert('success', 'Check your email — link expires in 30 min.');
    } else {
      $('loginResult').innerHTML = alert('error', r.data.error || 'Something went wrong.');
    }
  });
}

// ---------- ONBOARD PRE (anonymous landing) ----------
function renderOnboardPre() {
  root.innerHTML = `
    <div class="narrow">
      <h1>Create your branded apply page</h1>
      <p class="sub">Free. Live in 60 seconds. Drop the link wherever you currently take applicants — Indeed, Craigslist, Facebook, the side of your truck.</p>
      <div class="card">
        <div class="field">
          <label>Your work email</label>
          <input type="email" id="preEmail" required placeholder="you@yourshop.com" autofocus>
          <p class="hint">We'll email you a sign-in link to finish setup. No password.</p>
        </div>
        <button class="btn" id="preGo">Get started →</button>
        <div id="preResult" style="margin-top:14px"></div>
      </div>
    </div>`;
  $('preGo').addEventListener('click', async () => {
    const email = $('preEmail').value.trim();
    if (!email) return;
    const btn = $('preGo'); btn.disabled = true; btn.textContent = 'Sending…';
    const r = await api('/api/auth/magic-link', { method: 'POST', body: { email, redirect: '/app/?view=onboard' } });
    btn.disabled = false; btn.textContent = 'Get started →';
    if (r.ok) {
      $('preResult').innerHTML = alert('success', 'Check your email — click the link to continue setting up your apply page.');
    } else {
      $('preResult').innerHTML = alert('error', r.data.error || 'Something went wrong.');
    }
  });
}

// ---------- ONBOARD WIZARD ----------
const wizard = { step: 0, data: {} };
const WIZARD_STEPS = ['Shop info', 'Trade & location', 'Branding', 'Job details', 'Screening', 'Publish'];

function renderOnboardWizard() {
  if (!session) return setView('login');
  const data = wizard.data;
  const stepUI = stepRender();
  root.innerHTML = `
    <div class="narrow">
      <h1>Set up your apply page</h1>
      <p class="sub">${WIZARD_STEPS[wizard.step]} · step ${wizard.step + 1} of ${WIZARD_STEPS.length}</p>
      <div class="stepper">
        ${WIZARD_STEPS.map((_, i) => `<div class="step-pill ${i < wizard.step ? 'done' : i === wizard.step ? 'active' : ''}"></div>`).join('')}
      </div>
      <div class="card">
        ${stepUI}
        <div class="btn-row" style="margin-top:18px">
          ${wizard.step > 0 ? '<button class="btn secondary" onclick="wizardBack()">← Back</button>' : ''}
          <button class="btn" id="wizNext">${wizard.step === WIZARD_STEPS.length - 1 ? 'Publish →' : 'Continue →'}</button>
        </div>
        <div id="wizErr" style="margin-top:12px"></div>
      </div>
    </div>`;
  $('wizNext').addEventListener('click', wizardNext);
  attachStepHandlers();
}
function wizardBack() { wizard.step--; renderOnboardWizard(); }
async function wizardNext() {
  const ok = await captureStep();
  if (!ok) return;
  if (wizard.step === WIZARD_STEPS.length - 1) return await publishShop();
  wizard.step++;
  renderOnboardWizard();
}

function stepRender() {
  const d = wizard.data;
  switch (wizard.step) {
    case 0: return `
      <div class="field"><label>Shop name</label><input id="f_shop" value="${escapeHTML(d.shopName || '')}" placeholder="Mike's HVAC & Cooling"></div>
      <div class="field"><label>Your slug — your apply URL will be flexforce.ai/apply/<span style="color:var(--green)" id="slugPreview">${escapeHTML(d.slug || 'your-shop')}</span></label>
        <input id="f_slug" value="${escapeHTML(d.slug || '')}" placeholder="mikes-hvac" pattern="^[a-z0-9][a-z0-9-]*[a-z0-9]$">
        <p class="hint">3–40 characters · lowercase letters, numbers, dashes · first-come-first-served</p>
        <div id="slugStatus" style="margin-top:6px;font-size:12px"></div>
      </div>`;
    case 1: return `
      <div class="row">
        <div class="field"><label>Trade</label>
          <select id="f_trade">${TRADE_OPTIONS.map(t => `<option value="${t.value}"${d.trade===t.value?' selected':''}>${t.label}</option>`).join('')}</select>
        </div>
        <div class="field"><label>State</label>
          <select id="f_state">${STATE_OPTIONS.map(t => `<option value="${t.value}"${d.state===t.value?' selected':''}>${t.label}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field"><label>City (where you're hiring)</label><input id="f_city" value="${escapeHTML(d.city || '')}" placeholder="Austin"></div>`;
    case 2: return `
      <div class="field"><label>Pick a brand color</label>
        <div class="brand-grid">${BRAND_PRESETS.map((b, i) => `<div class="brand-tile ${(d.brand?.name||'Forest')===b.name?'selected':''}" data-idx="${i}" style="background:${b.primary}">${b.name}</div>`).join('')}</div>
        <p class="hint">Logos can be uploaded later from Settings. For now, your first letter is used.</p>
      </div>`;
    case 3: {
      const dd = d.job || {};
      return `
        <div class="field"><label>Job title</label><input id="f_title" value="${escapeHTML(dd.title || '')}" placeholder="HVAC Service Technician"></div>
        <div class="row">
          <div class="field"><label>Pay (low)</label><input id="f_payLow" type="number" value="${dd.payLow ?? ''}" placeholder="28"></div>
          <div class="field"><label>Pay (high)</label><input id="f_payHigh" type="number" value="${dd.payHigh ?? ''}" placeholder="45"></div>
        </div>
        <div class="field"><label>Quick summary (2–3 sentences)</label><textarea id="f_summary" placeholder="What's the role? Who are you? Why join?">${escapeHTML(dd.summary || '')}</textarea></div>
        <div class="field"><label>Perks (one per line)</label><textarea id="f_perks" placeholder="Health + dental\nTake-home truck\nPaid CE hours">${escapeHTML((dd.perks || []).join('\n'))}</textarea></div>`;
    }
    case 4: {
      const qs = (d.questions || []).slice();
      const blocks = qs.map((q, i) => `
        <div class="field" style="padding:14px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-bottom:10px">
          <label>Question ${i + 1}</label>
          <input value="${escapeHTML(q.en || '')}" data-q="en" data-i="${i}" placeholder="What's your license number?">
          <label style="margin-top:8px">Spanish (optional)</label>
          <input value="${escapeHTML(q.es || '')}" data-q="es" data-i="${i}" placeholder="¿Cuál es tu número de licencia?">
        </div>`).join('');
      return `
        <p class="sub" style="margin-bottom:14px">Smart defaults are filled based on your trade. Edit or add up to 8.</p>
        <div id="qList">${blocks}</div>
        <button class="btn secondary" id="addQ" type="button" style="margin-top:8px">+ Add question</button>
        <div class="field" style="margin-top:18px"><label>Cal.com booking link (optional)</label>
          <input id="f_cal" value="${escapeHTML(d.calLink || '')}" placeholder="https://cal.com/your-shop/screening">
          <p class="hint">If set, candidates can book an interview immediately after screening.</p>
        </div>
        <div class="field"><label>Languages</label>
          <div style="display:flex;gap:10px">
            <label style="display:inline-flex;align-items:center;gap:6px;font-weight:400"><input type="checkbox" id="f_lang_en" ${((d.languages||['en']).includes('en'))?'checked':''} style="width:auto"> English</label>
            <label style="display:inline-flex;align-items:center;gap:6px;font-weight:400"><input type="checkbox" id="f_lang_es" ${((d.languages||[]).includes('es'))?'checked':''} style="width:auto"> Spanish</label>
          </div>
        </div>`;
    }
    case 5: {
      return `
        <h2>Preview</h2>
        <div class="preview-box">
          <p style="font-size:13px;color:var(--text-mute);margin-bottom:6px">flexforce.ai/apply/${escapeHTML(d.slug)}</p>
          <h2 style="color:${(d.brand?.primary)||'#1d4d3d'};margin-bottom:6px">${escapeHTML(d.shopName)}</h2>
          <p style="font-size:14px;color:var(--text-mute);margin-bottom:10px">${escapeHTML(d.city||'')} ${d.state ? '· '+ escapeHTML(d.state.toUpperCase()) : ''}</p>
          <p><strong>${escapeHTML(d.job?.title || '')}</strong> · $${d.job?.payLow}–$${d.job?.payHigh}/hr</p>
          <p style="margin-top:8px;color:var(--text-mute);font-size:14px">${escapeHTML((d.job?.summary || '').slice(0, 200))}${(d.job?.summary || '').length>200?'…':''}</p>
        </div>
        <p class="hint" style="margin-top:16px">Once published, share your link wherever you currently post jobs. Every applicant goes through 60-second screening.</p>`;
    }
  }
}

function attachStepHandlers() {
  if (wizard.step === 0) {
    const slugInput = $('f_slug');
    const shopInput = $('f_shop');
    const preview = $('slugPreview');
    const status = $('slugStatus');
    let timer;
    const checkSlug = async () => {
      const v = (slugInput.value || '').toLowerCase().trim().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      slugInput.value = v;
      preview.textContent = v || 'your-shop';
      if (!v) return status.innerHTML = '';
      if (v.length < 3) return status.innerHTML = '<span style="color:var(--danger)">Too short — min 3 characters.</span>';
      status.innerHTML = '<span style="color:var(--text-mute)">Checking…</span>';
      clearTimeout(timer);
      timer = setTimeout(async () => {
        const r = await api('/api/shops/slug-available?slug=' + encodeURIComponent(v));
        if (r.data.available) status.innerHTML = '<span style="color:var(--success)">✓ Available</span>';
        else status.innerHTML = '<span style="color:var(--danger)">✗ Taken or reserved</span>';
      }, 300);
    };
    slugInput.addEventListener('input', checkSlug);
    shopInput.addEventListener('input', () => {
      if (!slugInput.value && shopInput.value) {
        slugInput.value = shopInput.value.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 30);
        checkSlug();
      }
    });
  }
  if (wizard.step === 2) {
    $$('.brand-tile').forEach(t => {
      t.addEventListener('click', () => {
        $$('.brand-tile').forEach(x => x.classList.remove('selected'));
        t.classList.add('selected');
        const idx = Number(t.dataset.idx);
        wizard.data.brand = BRAND_PRESETS[idx];
      });
    });
  }
  if (wizard.step === 4) {
    $('addQ').addEventListener('click', () => {
      wizard.data.questions = wizard.data.questions || [];
      if (wizard.data.questions.length >= 8) return;
      wizard.data.questions.push({ key: 'q' + (wizard.data.questions.length + 1), en: '', es: '' });
      // Save current inputs first
      captureStep().then(() => renderOnboardWizard());
    });
  }
}

async function captureStep() {
  const d = wizard.data;
  switch (wizard.step) {
    case 0: {
      d.shopName = $('f_shop').value.trim();
      d.slug = ($('f_slug').value || '').toLowerCase().trim().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      if (!d.shopName) return errStep('Shop name is required.');
      if (!d.slug || d.slug.length < 3) return errStep('Slug must be at least 3 characters.');
      const ck = await api('/api/shops/slug-available?slug=' + encodeURIComponent(d.slug));
      if (!ck.data.available) return errStep('That slug is taken or reserved. Try another.');
      break;
    }
    case 1:
      d.trade = $('f_trade').value;
      d.state = $('f_state').value;
      d.city = $('f_city').value.trim();
      // Smart defaults based on trade for later steps
      if (!d.questions) {
        const QSETS = {
          hvac: [{ key:'license', en:"What's your state HVAC license number?", es:'¿Cuál es tu número de licencia HVAC?' }, { key:'experience', en:'Years of residential HVAC experience?', es:'¿Años de experiencia en HVAC residencial?' }, { key:'epa608', en:'Do you have an active EPA 608 certification?', es:'¿Tienes certificación EPA 608 activa?' }, { key:'available', en:'When can you start?', es:'¿Cuándo puedes empezar?' }],
          plumbing: [{ key:'license', en:"What's your plumbing license number and tier?", es:'¿Número y nivel de licencia de plomería?' }, { key:'experience', en:'Years of plumbing work?', es:'¿Años de experiencia en plomería?' }, { key:'specialties', en:'Any specialties (backflow, gas, repipe)?', es:'¿Especialidades?' }, { key:'available', en:'When can you start?', es:'¿Cuándo puedes empezar?' }],
          electrical: [{ key:'license', en:"What's your electrical license number and tier?", es:'¿Número y nivel de licencia eléctrica?' }, { key:'experience', en:'Years of electrical experience?', es:'¿Años de experiencia eléctrica?' }, { key:'ev_solar', en:'EV charger or solar experience?', es:'¿Experiencia con EV o solar?' }, { key:'available', en:'When can you start?', es:'¿Cuándo puedes empezar?' }],
          roofing: [{ key:'experience', en:'Years on roofing crews?', es:'¿Años en cuadrillas de techado?' }, { key:'materials', en:'Materials installed (asphalt, metal, tile)?', es:'¿Materiales instalados?' }, { key:'crew_lead', en:'Have you led a crew?', es:'¿Has liderado una cuadrilla?' }, { key:'available', en:'When can you start?', es:'¿Cuándo puedes empezar?' }],
          other: [{ key:'experience', en:'How many years in your trade?', es:'¿Cuántos años en tu oficio?' }, { key:'specialty', en:"What're you best at?", es:'¿En qué eres mejor?' }, { key:'available', en:'When can you start?', es:'¿Cuándo puedes empezar?' }]
        };
        d.questions = QSETS[d.trade] || QSETS.other;
      }
      if (!d.job) {
        const TDEF = { hvac:{title:'HVAC Service Technician',payLow:28,payHigh:45,summary:'Looking for a licensed HVAC tech. Service, diagnostics, install work.',perks:['Health + dental','Take-home truck','Paid continuing-ed']}, plumbing:{title:'Service Plumber',payLow:30,payHigh:50,summary:'Looking for a licensed plumber for residential service.',perks:['Health + dental','Take-home van','Paid CE hours']}, electrical:{title:'Service Electrician',payLow:30,payHigh:55,summary:'Looking for a licensed electrician — service, panel upgrades, EV chargers.',perks:['Health + dental','Take-home van','Paid licensing renewal']}, roofing:{title:'Roofing Crew Lead',payLow:22,payHigh:40,summary:'Looking for a roofing crew lead. Asphalt + metal preferred.',perks:['Weekly pay','Storm-season bonuses','Tools provided']}, other:{title:'Field Technician',payLow:20,payHigh:40,summary:'Looking for a reliable field technician.',perks:['Health benefits','Steady hours','Growth opportunities']} };
        d.job = TDEF[d.trade] || TDEF.other;
      }
      break;
    case 2:
      if (!d.brand) d.brand = BRAND_PRESETS[0];
      break;
    case 3:
      d.job = d.job || {};
      d.job.title = $('f_title').value.trim();
      d.job.payLow = Number($('f_payLow').value) || 20;
      d.job.payHigh = Number($('f_payHigh').value) || 40;
      d.job.summary = $('f_summary').value.trim();
      d.job.perks = $('f_perks').value.split('\n').map(s => s.trim()).filter(Boolean);
      if (!d.job.title) return errStep('Job title is required.');
      break;
    case 4: {
      const qs = [];
      $$('input[data-i]').forEach(el => {
        const i = Number(el.dataset.i), q = el.dataset.q;
        qs[i] = qs[i] || { key: 'q' + (i + 1), en: '', es: '' };
        qs[i][q] = el.value.trim();
      });
      d.questions = qs.filter(q => q.en);
      if (!d.questions.length) return errStep('Add at least one screening question.');
      d.calLink = $('f_cal').value.trim();
      d.languages = [];
      if ($('f_lang_en').checked) d.languages.push('en');
      if ($('f_lang_es').checked) d.languages.push('es');
      if (!d.languages.length) d.languages = ['en'];
      break;
    }
  }
  return true;
}
function errStep(msg) { $('wizErr').innerHTML = alert('error', msg); return false; }

async function publishShop() {
  const btn = $('wizNext'); btn.disabled = true; btn.textContent = 'Publishing…';
  const r = await api('/api/shops/create', { method: 'POST', body: wizard.data });
  btn.disabled = false; btn.textContent = 'Publish →';
  if (!r.ok) {
    $('wizErr').innerHTML = alert('error', r.data.error || 'Failed to publish.');
    return;
  }
  // Optimistically update local state so the published view doesn't see an
  // empty myShops list and bounce back to onboarding.
  activeShopSlug = r.data.shop.slug;

  if (idx >= 0) myShops[idx] = r.data.shop; else myShops.unshift(r.data.shop);
  // Reset wizard state so a future onboard starts clean
  wizard.step = 0; wizard.data = {};
  setView('published');
}

function copy(text, evt) {
  const btn = evt && evt.currentTarget;
  navigator.clipboard.writeText(text).then(() => {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {});
}

async function saveSettings() {
  const shop = myShops.find(s => s.slug === activeShopSlug);
  const body = {
    shopName: $('s_name').value.trim(),
    city: $('s_city').value.trim(),
    job: {
      title: $('s_title').value.trim(),
      payLow: Number($('s_payLow').value) || 0,
      payHigh: Number($('s_payHigh').value) || 0,
      summary: $('s_summary').value.trim(),
      perks: $('s_perks').value.split('\n').map(s => s.trim()).filter(Boolean),
      schedule: shop.job?.schedule || 'Full-time'
    },
    calLink: $('s_cal').value.trim(),
    languages: [$('s_lang_en').checked ? 'en' : null, $('s_lang_es').checked ? 'es' : null].filter(Boolean)

        <div class="field">
          <label>Job post URL</label>
          <input id="i_url" placeholder="https://www.indeed.com/viewjob?jk=...">
        </div>
        <button class="btn" id="iGoUrl">Import from URL →</button>
        <div id="iResult" style="margin-top:14px"></div>
      </div>
      <div class="card">
        <h2>Option 2 — Paste the job post</h2>
        <p class="sub" style="margin-bottom:10px;font-size:13px">Open the Indeed/Craigslist page in your browser, select-all (Cmd+A), copy, paste below. Works for any board.</p>
        <div class="field">
          <label>Job post text</label>
          <textarea id="i_text" rows="8" placeholder="Paste the full job posting here — title, pay, description, perks…"></textarea>
        </div>
        <button class="btn" id="iGoText">Import from text →</button>
        <div id="iResultText" style="margin-top:14px"></div>
      </div>
    </div>`;

  const runImport = async (body, btnEl, resultEl) => {
    btnEl.disabled = true; const orig = btnEl.textContent; btnEl.textContent = 'Importing…';
    const r = await api('/api/import', { method: 'POST', body });
    btnEl.disabled = false; btnEl.textContent = orig;
    if (!r.ok) {
      resultEl.innerHTML = alert('error', r.data.message || r.data.error || 'Import failed.');
      return null;
    }
    return r.data.parsed;
  };

  $('iGoUrl').addEventListener('click', async () => {
    const url = $('i_url').value.trim();
    if (!url) return;
    const p = await runImport({ url }, $('iGoUrl'), $('iResult'));
    if (!p) return;
    fillWizardFrom(p);
  });
  $('iGoText').addEventListener('click', async () => {
    const text = $('i_text').value.trim();
    if (!text || text.length < 80) { $('iResultText').innerHTML = alert('error', 'Paste at least 80 characters of the job post.'); return; }
    const p = await runImport({ text }, $('iGoText'), $('iResultText'));
    if (!p) return;
    fillWizardFrom(p);
  });
}

function fillWizardFrom(p) {
  wizard.data = {
    shopName: '',
    slug: '',
    trade: p.tradeGuess || 'other',
    state: '',
    city: (p.location || '').split(',')[0]?.trim() || '',
    job: {
      title: p.title || '',
      payLow: p.payLow || 0,
      payHigh: p.payHigh || 0,
      summary: (p.description || '').slice(0, 500),
      schedule: p.schedule || 'Full-time',
      perks: []
    },
    brand: BRAND_PRESETS[0],
    languages: ['en']
  };
  wizard.step = 0;
  setView('onboard');
}

// ---------- ROUTING ----------
async function refreshShops() {
  const r = await api('/api/shops/mine');
  myShops = r.ok ? (r.data.shops || []) : [];
  if (!activeShopSlug && myShops.length) activeShopSlug = myShops[0].slug;
}
async function refreshSession() {
  const r = await api('/api/auth/me');
  session = r.data.session || null;
}

async function render() {
  $('navRight').innerHTML = navRight();
  const params = new URLSearchParams(location.search);
  const view = params.get('view') || (session ? 'dashboard' : 'login');
  // No auto-redirect — each view decides for itself how to handle no-shops.
  switch (view) {
    case 'login': return renderLogin();
    case 'onboard-pre': return renderOnboardPre();
    case 'onboard':
      if (!session) return setView('login');
      if (!wizard.data.brand) wizard.data.brand = BRAND_PRESETS[0];
      return renderOnboardWizard();
    case 'published': return renderPublished();
    case 'dashboard': return renderDashboard();
    case 'applicants': return renderApplicants();
    case 'settings': return renderSettings();
    case 'share': return renderShare();
    case 'import': return renderImport();
    default: return session ? renderDashboard() : renderLogin();
  }
}

(async () => {
  await refreshSession();
  if (session) await refreshShops();
  render();
})();

window.addEventListener('popstate', render);
window.setView = setView;
window.signOut = signOut;
window.wizardBack = wizardBack;
window.openApplicant = openApplicant;
window.saveApplicant = saveApplicant;
window.switchShop = switchShop;
window.saveSettings = saveSettings;
window.saveQuestions = saveQuestions;
window.copy = copy;
</script>
</body>
</html>
