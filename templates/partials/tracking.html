<!-- FlexForce page identity + UTM decoration + click/submit tracking -->
<script>
(function() {
  window.flexforcePage = {
    id: '{{PAGE_ID}}',
    type: '{{PAGE_TYPE}}',
    state: '{{PAGE_STATE}}',
    trade: '{{PAGE_TRADE}}',
    wave: '{{PAGE_WAVE}}'
  };
  var P = window.flexforcePage;
  var UTM_SOURCE = 'flexforce_content';
  var UTM_MEDIUM = 'organic';

  // Decorate lead-attribution CTAs with UTM params on load.
  // Only links with data-utm-content are touched — internal nav stays clean.
  function decorate() {
    document.querySelectorAll('a[data-utm-content]').forEach(function(a) {
      var raw = a.getAttribute('href') || '';
      // Skip non-http, mailto/tel, and same-page hash anchors (no lead attribution).
      if (!raw || raw.indexOf('mailto:') === 0 || raw.indexOf('tel:') === 0 || raw.charAt(0) === '#') return;
      try {
        var u = new URL(raw, window.location.origin);
        u.searchParams.set('utm_source', UTM_SOURCE);
        u.searchParams.set('utm_medium', UTM_MEDIUM);
        u.searchParams.set('utm_campaign', P.id || 'unknown');
        u.searchParams.set('utm_content', a.dataset.utmContent);
        if (u.origin === window.location.origin) {
          a.href = u.pathname + (u.search || '') + (u.hash || '');
        } else {
          a.href = u.toString();
        }
      } catch (e) {}
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', decorate);
  } else {
    decorate();
  }

  // Common payload-emit helper. Pushes to dataLayer (GTM), PostHog, gtag, Plausible.
  function emit(eventName, props) {
    var base = {
      event: eventName,
      page_id: P.id,
      page_type: P.type,
      page_state: P.state,
      page_trade: P.trade,
      page_wave: P.wave
    };
    var payload = Object.assign({}, base, props || {});
    (window.dataLayer = window.dataLayer || []).push(payload);
    if (window.posthog && typeof window.posthog.capture === 'function') {
      window.posthog.capture(eventName, payload);
    }
    if (typeof window.gtag === 'function') {
      window.gtag('event', eventName, payload);
    }
    if (typeof window.plausible === 'function') {
      window.plausible(eventName, { props: payload });
    }
  }
  window.flexforceTrack = emit; // expose for ad-hoc events from app code

  // Link clicks — every <a> on the page.
  document.addEventListener('click', function(e) {
    var a = e.target.closest && e.target.closest('a');
    if (a) {
      var href = a.getAttribute('href') || '';
      var external = /^https?:\/\//i.test(href) && href.indexOf(window.location.origin) !== 0;
      emit('link_click', {
        link_url: href,
        link_text: (a.innerText || a.textContent || '').trim().slice(0, 80),
        link_class: a.className || '',
        link_external: external,
        utm_content: (a.dataset && a.dataset.utmContent) || ''
      });
      return;
    }
    // Button clicks — explicit buttons not wrapped in <a>.
    var b = e.target.closest && e.target.closest('button');
    if (b) {
      emit('button_click', {
        button_id: b.id || '',
        button_text: (b.innerText || b.textContent || '').trim().slice(0, 80),
        button_class: b.className || '',
        button_type: b.type || '',
        utm_content: (b.dataset && b.dataset.utmContent) || ''
      });
    }
  }, true);

  // Form submits — capture which form fired.
  document.addEventListener('submit', function(e) {
    var f = e.target;
    if (!f || f.tagName !== 'FORM') return;
    emit('form_submit', {
      form_id: f.id || '',
      form_action: f.getAttribute('action') || '',
      form_class: f.className || ''
    });
  }, true);
})();
</script>
